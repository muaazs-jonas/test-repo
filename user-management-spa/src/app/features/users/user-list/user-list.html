<div style="padding: 20px">
  <div
    style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px"
  >
    <h2 style="margin: 0">User Directory</h2>

    <button
      routerLink="/users/add"
      style="
        background-color: #0d6efd;
        color: white;
        border: none;
        padding: 10px 15px;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
      "
    >
      + Add New User
    </button>
  </div>
</div>

<table
  *ngIf="userService.users().length > 0"
  style="width: 100%; border-collapse: collapse; text-align: left"
>
  <thead>
    <tr style="background-color: #f4f4f4; border-bottom: 2px solid #ccc">
      <th style="padding: 10px">Name</th>
      <th style="padding: 10px">Email</th>
      <th style="padding: 10px">Password</th>
      <th style="padding: 10px; text-align: center">Actions</th>
    </tr>
  </thead>

  <tbody>
    <tr *ngFor="let user of userService.users()" @fadeSlideInOut>
      <td>{{ user.name }}</td>
      <td>{{ user.email }}</td>
      <td>********</td>
      <td style="padding: 10px; text-align: center">
        <button
          [routerLink]="['/users/edit', user.email]"
          class="btn btn-primary"
          style="padding: 5px 10px; font-size: 14px; margin-right: 8px"
        >
          Edit
        </button>

        <button
          class="btn btn-danger"
          style="padding: 5px 10px; font-size: 14px"
          (click)="deleteUser(user.email)"
        >
          Delete
        </button>
      </td>
    </tr>
  </tbody>
</table>
