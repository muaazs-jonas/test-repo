<div class="auth-wrapper">
  <div class="auth-card" @formEntrance>
    <h2>Welcome Back</h2>
    <p class="auth-subtitle">Please enter your details to sign in</p>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="mb-3">
        <label class="form-label">Email Address</label>
        <input type="email" formControlName="email" placeholder="you@example.com" />
      </div>

      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" formControlName="password" placeholder="••••••••" />
      </div>

      <p *ngIf="errorMessage" style="color: #ef4444; font-size: 14px; margin-bottom: 12px">
        {{ errorMessage }}
      </p>

      <button type="submit" class="btn btn-primary w-100" style="padding: 12px">Sign In</button>
    </form>

    <p class="auth-footer">Don't have an account? <a routerLink="/register">Create one</a></p>
  </div>
</div>
